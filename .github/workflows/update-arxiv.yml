name: Update arXiv archive

on:
  schedule:
    # GitHub Actions uses UTC. 00:00 UTC is 08:00 in Beijing/Singapore.
    # The job fetches the last completed UTC date and backfills recent days.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional archive date: YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch arXiv papers
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/fetch_arxiv.py --date "${{ github.event.inputs.date }}" --timezone Asia/Shanghai --max-results 2000
          else
            ARCHIVE_DATE="$(date -u -d 'yesterday' +'%F')"
            python scripts/fetch_arxiv.py --date "$ARCHIVE_DATE" --days 8 --timezone Asia/Shanghai --max-results 2000
          fi

      - name: Commit archive updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/index.json data/papers
          if git diff --cached --quiet; then
            echo "No archive changes."
          else
            git commit -m "Update arXiv archive"
            git push
          fi
