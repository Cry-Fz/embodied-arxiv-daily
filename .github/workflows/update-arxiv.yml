name: Update arXiv archive

on:
  schedule:
    # GitHub Actions uses UTC. 00:00 UTC is 08:00 in Beijing/Singapore.
    # The job fetches the last completed UTC date and backfills recent days.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional archive date: YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch arXiv papers
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARCHIVE_DATE="${{ github.event.inputs.date }}"
            UPDATE_DAYS=1
          else
            ARCHIVE_DATE="$(date -u -d 'yesterday' +'%F')"
            UPDATE_DAYS=8
          fi
          echo "ARCHIVE_DATE=$ARCHIVE_DATE" >> "$GITHUB_ENV"
          echo "UPDATE_DAYS=$UPDATE_DAYS" >> "$GITHUB_ENV"
          python scripts/fetch_arxiv.py --date "$ARCHIVE_DATE" --days "$UPDATE_DAYS" --timezone Asia/Shanghai --max-results 2000

      - name: Translate paper metadata
        env:
          TRANSLATION_API_KEY: ${{ secrets.TRANSLATION_API_KEY }}
          TRANSLATION_API_URL: ${{ vars.TRANSLATION_API_URL }}
          TRANSLATION_MODEL: ${{ vars.TRANSLATION_MODEL }}
          TRANSLATION_PROVIDER: ${{ vars.TRANSLATION_PROVIDER }}
        run: |
          if python scripts/translate_papers.py --date "$ARCHIVE_DATE" --days "$UPDATE_DAYS" --timezone Asia/Shanghai; then
            python scripts/fetch_arxiv.py --rebuild-index --timezone Asia/Shanghai
          else
            echo "Translation failed; keeping English metadata and continuing archive update."
          fi

      - name: Commit archive updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/index.json data/papers
          if git diff --cached --quiet; then
            echo "No archive changes."
          else
            git commit -m "Update arXiv archive"
            git push
          fi
